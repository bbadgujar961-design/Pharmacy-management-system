<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pharmacy Secure Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
       
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            background-color: #1e293b; 
            background-blend-mode: overlay;
        }

        
        .login-card { 
            width: 100%; 
            max-width: 420px; 
            text-align: center; 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            animation: slideUpFade 0.6s ease-out forwards;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

       
        .icon-header {
            font-size: 40px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-card h1 { 
            color: #0f172a; 
            margin-bottom: 5px; 
            font-size: 28px; 
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .highlight { color: #2563eb; }

        .login-card p { 
            color: #64748b; 
            font-size: 15px; 
            margin-bottom: 30px; 
        }

    
        .form-input {
            padding: 15px;
            font-size: 16px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            background-color: rgba(255, 255, 255, 0.9);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            text-align: center;
            letter-spacing: 0.5px;
            margin-bottom: 12px; /* Added spacing between boxes */
        }

        .form-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
            background-color: #ffffff;
            outline: none;
        }

    
        .btn-gradient {
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            color: white;
            width: 100%;
            padding: 15px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
            margin-top: 10px;
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
            background: linear-gradient(135deg, #0284c7, #1d4ed8);
        }

        #otpSection { display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="icon-header">⚕️</div>
        <h1>Pharma<span class="highlight">Sync</span></h1>
        <p>Secure Access Portal</p>

        <div id="phoneSection">
            <input type="text" id="nameInput" class="form-input" placeholder="Full Name">
            <input type="number" id="ageInput" class="form-input" placeholder="Age">
            
            <input type="text" id="phoneInput" class="form-input" placeholder="Mobile Number" maxlength="15">
            
            <button class="btn-gradient" onclick="sendOTP()">Login / Register</button>
            <p id="phoneMessage" style="margin-top: 15px; font-size: 14px; font-weight: 500;"></p>
        </div>

        <div id="otpSection">
            <p style="color: #0ea5e9; font-weight: 600; margin-bottom: 15px; background: #f0f9ff; padding: 10px; border-radius: 8px;">
                ✓ Secure code sent to your device
            </p>
            <input type="text" id="otpInput" class="form-input" placeholder="Enter 4-Digit OTP" maxlength="4" style="letter-spacing: 8px; font-size: 20px; font-weight: bold;">
            <button class="btn-gradient" onclick="verifyOTP()">Verify & Access</button>
            <p id="otpMessage" style="margin-top: 15px; font-size: 14px; font-weight: 500;"></p>
        </div>
    </div>

    <script>
        let currentPhone = "";
        let currentName = "";
        let currentAge = "";

        function sendOTP() {
            // Grab all values from the new boxes
            const name = document.getElementById('nameInput').value;
            const age = document.getElementById('ageInput').value;
            const phone = document.getElementById('phoneInput').value;
            const msgBox = document.getElementById('phoneMessage');
            
            // Make sure they filled out everything
            if(!name || !age || !phone) { 
                msgBox.innerText = "Please fill in all details."; 
                msgBox.style.color = "#ef4444"; 
                return; 
            }

            msgBox.innerText = "Authenticating...";
            msgBox.style.color = "#64748b";

            fetch('http://localhost:5000/api/request-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name, age: age, phone: phone })
            })
            .then(res => res.json())
            .then(data => {
                if(data.error) {
                    msgBox.innerText = "❌ " + data.error;
                    msgBox.style.color = "#ef4444";
                } else {
                    currentPhone = phone;
                    currentName = name;
                    currentAge = age;
                    document.getElementById('phoneSection').style.display = 'none';
                    document.getElementById('otpSection').style.display = 'block';
                    document.getElementById('otpInput').focus(); 
                }
            })
            .catch(err => {
                msgBox.innerText = "❌ Connection error.";
                msgBox.style.color = "#ef4444";
            });
        }

        function verifyOTP() {
            const otp = document.getElementById('otpInput').value;
            const msgBox = document.getElementById('otpMessage');

            if(!otp) {
                msgBox.innerText = "Please enter the OTP."; 
                msgBox.style.color = "#ef4444";
                return;
            }

            fetch('http://localhost:5000/api/verify-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone: currentPhone, otp: otp })
            })
            .then(res => res.json())
            .then(data => {
                if(data.error) {
                    msgBox.innerText = "❌ " + data.error;
                    msgBox.style.color = "#ef4444";
                } else {
                    localStorage.setItem("isLoggedIn", "true");
                    
                    localStorage.setItem("userName", currentName); 
                    window.location.href = "dashboard.html"; 
                }
            })
            .catch(err => {
                msgBox.innerText = "❌ Connection error.";
                msgBox.style.color = "#ef4444";
            });
        }
    </script>
</body>
</html>
