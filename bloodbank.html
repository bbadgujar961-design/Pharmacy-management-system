<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blood Bank Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { 
            color: #1e293b; 
            padding: 20px; 
            min-height: 100vh;
            
            
            background-image: url('https://images.unsplash.com/photo-1579154204601-01588f351e67?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            
            
            background-color: rgba(30, 5, 10, 0.85); 
            background-blend-mode: overlay;
        }
        
        
        .header { 
            background: linear-gradient(135deg, #be123c, #e11d48); 
            color: white; 
            padding: 20px 40px; 
            border-radius: 16px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            box-shadow: 0 10px 25px rgba(225, 29, 72, 0.2);
            margin-bottom: 30px;
        }
        .header h1 { font-size: 28px; letter-spacing: 1px; }
        .btn-nav { background: white; color: #be123c; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: 600; border: none; cursor: pointer; transition: 0.3s; }
        .btn-nav:hover { background: #f1f5f9; transform: scale(1.05); }

        
        .stock-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .blood-card { 
            background: white; 
            padding: 25px; 
            border-radius: 16px; 
            text-align: center; 
            border: 2px solid #e2e8f0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: 0.3s;
        }
        .blood-card:hover { border-color: #e11d48; transform: translateY(-5px); }
        .blood-type { font-size: 36px; font-weight: 700; color: #e11d48; margin-bottom: 10px; }
        .blood-count { font-size: 20px; font-weight: 600; color: #475569; }
        .urgent { border-color: #ef4444; background: #fef2f2; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

      
        .actions-container { display: flex; gap: 30px; }
        .panel { flex: 1; background: white; padding: 30px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .panel h2 { color: #0f172a; margin-bottom: 20px; font-size: 20px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px;}
        
        .form-input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; }
        .btn-action { width: 100%; padding: 15px; font-size: 16px; font-weight: 600; color: white; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .btn-donate { background: #10b981; } .btn-donate:hover { background: #059669; }
        .btn-dispense { background: #3b82f6; } .btn-dispense:hover { background: #2563eb; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #e2e8f0; }
        th { color: #64748b; font-weight: 600; font-size: 14px; text-transform: uppercase; }
        .badge { padding: 4px 8px; border-radius: 6px; background: #fee2e2; color: #991b1b; font-weight: 600; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🩸 Central Blood Bank</h1>
        <button class="btn-nav" onclick="window.location.href='dashboard.html'">⬅ Back to Pharmacy</button>
    </div>

    <div class="stock-grid" id="stockGrid">
        </div>

    <div class="actions-container">
        <div class="panel">
            <h2>➕ Record New Donation</h2>
            <input type="text" id="donorName" class="form-input" placeholder="Donor Full Name">
            <input type="text" id="donorPhone" class="form-input" placeholder="Phone Number" maxlength="15">
            <select id="donorGroup" class="form-input">
                <option value="A+">A+</option><option value="A-">A-</option>
                <option value="B+">B+</option><option value="B-">B-</option>
                <option value="O+">O+</option><option value="O-">O-</option>
                <option value="AB+">AB+</option><option value="AB-">AB-</option>
            </select>
            <input type="date" id="donationDate" class="form-input">
            <button class="btn-action btn-donate" onclick="recordDonation()">Record & Add 1 Bag</button>
            <p id="donateMsg" style="margin-top: 10px; font-weight: bold; text-align: center;"></p>
        </div>

        <div class="panel">
            <h2>🏥 Dispense Blood to Patient</h2>
            <div style="display: flex; gap: 10px; margin-bottom: 30px;">
                <select id="dispenseGroup" class="form-input" style="margin-bottom: 0;">
                    <option value="A+">A+</option><option value="A-">A-</option>
                    <option value="B+">B+</option><option value="B-">B-</option>
                    <option value="O+">O+</option><option value="O-">O-</option>
                    <option value="AB+">AB+</option><option value="AB-">AB-</option>
                </select>
                <button class="btn-action btn-dispense" style="width: 50%;" onclick="dispenseBlood()">Dispense 1 Bag</button>
            </div>
            <p id="dispenseMsg" style="margin-top: -20px; margin-bottom: 20px; font-weight: bold; text-align: center;"></p>

            <h2>Recent Donors</h2>
            <table>
                <thead><tr><th>Donor Name</th><th>Blood Group</th><th>Date</th></tr></thead>
                <tbody id="donorsTable"></tbody>
            </table>
        </div>
    </div>

    <script>
       
        if (localStorage.getItem("isLoggedIn") !== "true") { window.location.href = "index.html"; }
        function logout() {
            localStorage.removeItem("isLoggedIn");
            window.location.href = "login.html"; 
        }
        
        document.getElementById('donationDate').valueAsDate = new Date();

        window.onload = () => { fetchBloodData(); };

        function fetchBloodData() {
            fetch('http://localhost:5000/api/blood/dashboard')
            .then(res => res.json())
            .then(data => {
                renderStock(data.stock);
                renderDonors(data.donors);
            });
        }

        function renderStock(stockArray) {
            const grid = document.getElementById('stockGrid');
            grid.innerHTML = '';
            stockArray.forEach(item => {
               
                const isUrgent = item.bags_available < 3 ? 'urgent' : '';
                grid.innerHTML += `
                    <div class="blood-card ${isUrgent}">
                        <div class="blood-type">${item.blood_group}</div>
                        <div class="blood-count">${item.bags_available} Bags Available</div>
                        ${item.bags_available < 3 ? '<p style="color:red; font-size:12px; margin-top:5px; font-weight:bold;">URGENT SHORTAGE</p>' : ''}
                    </div>
                `;
            });
        }

        function renderDonors(donorsArray) {
            const tbody = document.getElementById('donorsTable');
            tbody.innerHTML = '';
            donorsArray.forEach(donor => {
                tbody.innerHTML += `
                    <tr>
                        <td>${donor.donor_name}</td>
                        <td><span class="badge">${donor.blood_group}</span></td>
                        <td>${donor.donation_date}</td>
                    </tr>
                `;
            });
        }

        function recordDonation() {
            const data = {
                donor_name: document.getElementById('donorName').value,
                phone: document.getElementById('donorPhone').value,
                blood_group: document.getElementById('donorGroup').value,
                donation_date: document.getElementById('donationDate').value
            };

            if(!data.donor_name) { alert("Please enter donor name!"); return; }

            fetch('http://localhost:5000/api/blood/donate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(res => res.json()).then(resData => {
                document.getElementById('donateMsg').innerText = "✅ " + resData.message;
                document.getElementById('donateMsg').style.color = "green";
                document.getElementById('donorName').value = '';
                document.getElementById('donorPhone').value = '';
                fetchBloodData(); // Reload dashboard instantly
                setTimeout(() => document.getElementById('donateMsg').innerText = '', 3000);
            });
        }

        function dispenseBlood() {
            const bGroup = document.getElementById('dispenseGroup').value;
            
            fetch('http://localhost:5000/api/blood/dispense', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ blood_group: bGroup })
            }).then(res => res.json()).then(resData => {
                const msgBox = document.getElementById('dispenseMsg');
                if(resData.error) {
                    msgBox.innerText = "❌ " + resData.error;
                    msgBox.style.color = "red";
                } else {
                    msgBox.innerText = "✅ " + resData.message;
                    msgBox.style.color = "green";
                    fetchBloodData(); // Reload dashboard instantly
                }
                setTimeout(() => msgBox.innerText = '', 3000);
            });
        }
    </script>
</body>
</html>
